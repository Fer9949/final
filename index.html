
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRC Master Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* ── Print / PDF styles ─────────────────────────────────── */
        @media print {
            /* Hide non-essential chrome */
            .print\:hidden { display: none !important; }

            /* Reset page background */
            body { background-color: #ffffff !important; }

            /* Remove the fixed-height scroll clipping from the app shell */
            #app-wrapper {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
            }

            /* Make main content fill the page and show all scrolled content */
            #main-content {
                display: block !important;
                overflow: visible !important;
                height: auto !important;
                width: 100% !important;
                flex: none !important;
            }

            /* Let sections break naturally across pages */
            .space-y-8 > div {
                page-break-inside: auto;
                break-inside: auto;
            }

            /* Ensure color backgrounds print */
            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            @page {
                margin: 1.5cm 1.5cm;
                size: A4 portrait;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
